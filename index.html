<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solicitud de Contratos</title>

    <!-- Flatpickr CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link
      rel="stylesheet"
      href="https://npmcdn.com/flatpickr/dist/l10n/es.css"
    />

    <style>
      :root {
        --primary: #1565c0;
        --secondary: #f5f7fa;
        --text: #333;
        --input-border: #ccc;
        --radius: 10px;
        --shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background-color: var(--secondary);
        margin: 0;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
      }

      .card-form {
        background: #fff;
        padding: 40px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        width: 100%;
        max-width: 800px;
        transition: all 0.3s ease;
      }

      h2 {
        margin-top: 0;
        color: var(--primary);
        text-align: center;
        font-size: 28px;
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text);
        font-size: 15px;
      }

      input[type="text"],
      input[type="email"],
      input[type="file"],
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border-radius: var(--radius);
        border: 1px solid var(--input-border);
        font-size: 14px;
        transition: border-color 0.2s ease;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      select:focus,
      textarea:focus {
        border-color: var(--primary);
        outline: none;
      }

      textarea {
        resize: vertical;
        min-height: 120px;
      }

      input[type="submit"] {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        width: 100%;
      }

      input[type="submit"]:hover {
        background-color: #0d47a1;
      }

      input[type="checkbox"] {
        margin-right: 8px;
      }

      .note {
        font-size: 13px;
        color: #777;
        margin-top: 5px;
      }

      .currency-input {
        position: relative;
      }

      .currency-input::before {
        content: "$";
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #666;
        font-weight: bold;
        z-index: 1;
      }

      .currency-input input {
        padding-left: 30px;
      }

      .priority-description {
        font-size: 14px;
        background: #f1f3f5;
        padding: 12px;
        border-radius: 10px;
        color: #333;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card-form">
      <h2>📄 Solicitud de Contratos</h2>

      <form
        action="https://formsubmit.co/sandra.varon@torreon.com.co"
        method="POST"
        enctype="multipart/form-data"
      >
        <input type="text" name="_honey" style="display: none" />
        <input type="hidden" name="_captcha" value="false" />
        <input
          type="hidden"
          name="_cc"
          value="brandon.perdomo@torreon.com.co"
        />

        <div class="form-group">
          <label>🧾 Código de caso</label>
          <input
            type="text"
            id="codigo_caso"
            name="codigo_caso"
            readonly
            style="background: #f1f3f5"
          />
        </div>

        <div class="form-group">
          <label>👤 Nombre del solicitante</label>
          <input type="text" name="nombre_solicitante" required />
        </div>

        <div class="form-group">
          <label>📞 Número de contacto</label>
          <input
            type="text"
            name="numero_contacto"
            inputmode="numeric"
            class="solo-numeros"
            required
          />
        </div>

        <div class="form-group">
          <label>📧 Correo electrónico</label>
          <input type="email" name="correo_electronico" required />
        </div>

        <div class="form-group">
          <label>🏢 Sucursal</label>
          <select name="sucursal" required>
            <option value="">Selecciona...</option>
            <option>MULTI</option>
            <option>TBC</option>
          </select>
        </div>

        <div class="form-group">
          <label>🏗️ Centro de costo</label>
          <input
            type="text"
            name="centro_costo"
            placeholder="Ej: Proyectos, Soporte corporativo..."
            required
          />
        </div>

        <div class="form-group">
          <label>🏪 Nombre del proveedor</label>
          <input type="text" name="nombre_proveedor" required />
        </div>

        <div class="form-group">
          <label>🆔 NIT</label>
          <input
            type="text"
            name="nit"
            inputmode="numeric"
            class="solo-numeros"
            required
          />
        </div>

        <div class="form-group">
          <label>📝 Tipo de solicitud</label>
          <select name="tipo_solicitud" required>
            <option value="">Selecciona...</option>
            <option>Contrato nuevo</option>
            <option>Contrato por ampliación de fecha</option>
            <option>Contrato por ampliación de valor</option>
            <option>Contrato por ampliación de fecha y valor</option>
          </select>
        </div>

        <div class="form-group">
          <label>📋 Descripción de la solicitud ( ¿Que se va a causar? )</label>
          <textarea
            name="descripcion_solicitud"
            placeholder="Ej: Notariales, servicios públicos, cajas menores..."
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label>💰 Valor del contrato</label>
          <div class="currency-input">
            <input type="text" name="valor_contrato" placeholder="0" required />
          </div>
        </div>

        <div class="form-group">
          <label>⚠️ Prioridad</label>
          <select name="prioridad" id="prioridad" required>
            <option value="">Selecciona...</option>
            <option value="baja">🔵 Baja (192h)</option>
            <option value="media">🟡 Media (32h)</option>
            <option value="alta">🔴 Alta (24h)</option>
          </select>
        </div>

        <div id="descripcion-prioridad" class="priority-description">
          Selecciona una prioridad para ver la descripción detallada.
        </div>

        <div class="form-group">
          <label>📎 Anexos (opcional)</label>
          <input type="file" name="anexos" multiple />
          <p class="note">
            Puedes adjuntar múltiples archivos manteniendo presionado Ctrl/Cmd
          </p>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" name="autorizacion" required />
            Acepto el tratamiento de mis datos para el procesamiento de esta
            solicitud
          </label>
        </div>

        <input type="submit" value="📨 Enviar Solicitud de Contrato" />
        <p class="note">
          📩 Recibirás confirmación en tu correo al enviar este formulario.
        </p>
      </form>
    </div>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script>
      // Descripción de prioridad
      const selectPrioridad = document.getElementById("prioridad");
      const descripcion = document.getElementById("descripcion-prioridad");

      const textos = {
        baja: `🔵 <strong>Baja (192 horas laborales)</strong><br>
      Dentro de las primeras 24 horas se informará al solicitante el proceso que se realizará.`,
        media: `🟡 <strong>Media (32 horas laborales)</strong><br>
      No afecta totalmente el proceso, pero es indispensable para otras actividades.`,
        alta: `🔴 <strong>Alta (24 horas laborales)</strong><br>
      Afecta completamente la continuidad del proceso o paraliza al usuario.`,
      };

      selectPrioridad.addEventListener("change", function () {
        const valor = this.value;
        descripcion.innerHTML =
          textos[valor] ||
          "Selecciona una prioridad para ver la descripción detallada.";
      });

      // Generador de código de caso automático
      function generarCodigoCaso() {
        const fecha = new Date();
        const dia = String(fecha.getDate()).padStart(2, "0");
        const mes = String(fecha.getMonth() + 1).padStart(2, "0");
        const anio = fecha.getFullYear();
        const aleatorio = Math.floor(1000 + Math.random() * 9000);
        return `CASE-CONT-${anio}${mes}${dia}-${aleatorio}`;
      }

      // Formateo del valor del contrato
      function formatearValor(input) {
        let valor = input.value.replace(/\D/g, "");
        if (valor) {
          valor = parseInt(valor).toLocaleString("es-CO");
        }
        input.value = valor;
      }

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("codigo_caso").value = generarCodigoCaso();

        // Formateo automático del valor
        const inputValor = document.querySelector(
          'input[name="valor_contrato"]'
        );
        inputValor.addEventListener("input", function () {
          formatearValor(this);
        });

        // Validar solo números
        const camposSoloNumeros = document.querySelectorAll(".solo-numeros");
        camposSoloNumeros.forEach((campo) => {
          campo.addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, "");
          });
        });
      });
    </script>
  </body>
</html>
